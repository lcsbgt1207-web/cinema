<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveautés — CinéProche</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    .page-content { padding: 0 0 48px; }

    .films-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 0; }
    @media (max-width: 1000px) { .films-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .films-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 400px)  { .films-grid { grid-template-columns: 1fr; } }

    .film-card { border: 0.5px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.18s, box-shadow 0.18s; background: var(--white); opacity: 0; animation: fadeUp 0.4s ease forwards; }
    .film-card:hover { border-color: var(--gray-300); transform: translateY(-3px); box-shadow: var(--shadow-md); }

    .film-poster { width: 100%; aspect-ratio: 2/3; position: relative; overflow: hidden; background: var(--gray-100); }
    .film-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .film-card:hover .film-poster img { transform: scale(1.03); }
    .film-poster-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: var(--gray-100); }
    .film-poster-placeholder i { font-size: 40px; color: var(--gray-300); }
    .film-poster-badge { position: absolute; top: 10px; left: 10px; }

    .film-note-overlay { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; font-size: 11px; font-weight: 500; padding: 3px 7px; border-radius: 5px; display: flex; align-items: center; gap: 3px; }

    .film-card-info { padding: 13px 15px 15px; border-top: 0.5px solid var(--gray-200); }
    .film-card-title { font-size: 14px; font-weight: 500; color: var(--black); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .film-card-meta { font-size: 12px; color: var(--gray-500); display: flex; align-items: center; gap: 8px; }

    /* Skeleton loading */
    .skeleton { background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-md); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { border: 0.5px solid var(--gray-200); border-radius: var(--radius-lg); overflow: hidden; }
    .skeleton-poster { aspect-ratio: 2/3; }
    .skeleton-info { padding: 13px 15px 15px; }
    .skeleton-title { height: 16px; margin-bottom: 8px; border-radius: 4px; }
    .skeleton-meta { height: 12px; width: 60%; border-radius: 4px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border: 0.5px solid var(--gray-200); border-radius: var(--radius-md); overflow: hidden; margin-top: 8px; }
    .tab { font-size: 13px; padding: 8px 18px; cursor: pointer; border: none; background: none; color: var(--gray-500); border-right: 0.5px solid var(--gray-200); font-family: var(--font-main); transition: background var(--transition); }
    .tab:last-child { border-right: none; }
    .tab.active { background: var(--black); color: var(--white); }
    .tab:hover:not(.active) { background: var(--gray-50); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon"><i class="ti ti-movie"></i></div>
        <span class="logo-text">Ciné<span>Proche</span></span>
      </a>
      <div class="header-right">
        <nav class="nav">
          <a href="nouveautes.html" class="active">Nouveautés</a>
          <a href="catalogue.html">Catalogue</a>
          <a href="agenda.html">Mon agenda</a>
          <a href="#contact">Contact</a>
        </nav>
        <button class="btn-user" onclick="window.location.href='agenda.html'"><i class="ti ti-user"></i></button>
      </div>
    </div>
  </div>
</header>

<main class="container page-content">
  <div class="page-header">
    <div>
      <div class="page-title">Nouveautés</div>
      <div class="tabs" style="margin-top:10px;">
        <button class="tab active" id="tab-now" onclick="switchTab('now')">À l'affiche</button>
        <button class="tab" id="tab-soon" onclick="switchTab('soon')">Prochainement</button>
      </div>
    </div>
    <div class="page-count" id="films-count"></div>
  </div>

  <div class="films-grid" id="films-grid">
    <!-- Skeletons pendant le chargement -->
    ${Array(8).fill(`
      <div class="skeleton-card">
        <div class="skeleton skeleton-poster"></div>
        <div class="skeleton-info">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-meta"></div>
        </div>
      </div>
    `).join('')}
  </div>
</main>

<!-- OVERLAY POPUP FILM -->
<div class="overlay" id="film-overlay" onclick="closeOnBg(event)">
  <div class="popup" id="film-popup"></div>
</div>

<!-- OVERLAY RÉSERVATION -->
<div class="overlay" id="resa-overlay">
  <div class="popup" style="max-width:420px;">
    <div style="padding:20px 22px 16px;border-bottom:0.5px solid var(--gray-200);">
      <div style="font-size:16px;font-weight:500;color:var(--black);margin-bottom:4px;" id="resa-film"></div>
      <div style="font-size:13px;color:var(--gray-500);display:flex;align-items:center;gap:5px;"><i class="ti ti-building"></i><span id="resa-cinema"></span></div>
    </div>
    <div style="padding:16px 22px;display:flex;flex-direction:column;gap:10px;border-bottom:0.5px solid var(--gray-200);">
      <div style="display:flex;align-items:center;gap:12px;font-size:13px;"><i class="ti ti-clock" style="color:var(--gray-400);"></i><span style="color:var(--gray-500);min-width:70px;">Séance</span><span style="font-weight:500;" id="resa-heure"></span></div>
      <div style="display:flex;align-items:center;gap:12px;font-size:13px;"><i class="ti ti-calendar" style="color:var(--gray-400);"></i><span style="color:var(--gray-500);min-width:70px;">Date</span><span style="font-weight:500;" id="resa-date"></span></div>
    </div>
    <div style="padding:14px 22px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="confirmReservation()"><i class="ti ti-external-link"></i> Réserver sur AlloCiné</button>
      <p style="font-size:11px;color:var(--gray-400);text-align:center;">Vous serez redirigé vers AlloCiné pour finaliser votre réservation.</p>
      <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="closeResaOverlay()">Annuler</button>
    </div>
  </div>
</div>

<!-- OVERLAY RETOUR -->
<div class="overlay" id="retour-overlay">
  <div class="popup" style="max-width:420px;">
    <div style="padding:24px 22px 16px;text-align:center;border-bottom:0.5px solid var(--gray-200);">
      <div style="width:48px;height:48px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;"><i class="ti ti-check" style="font-size:22px;color:var(--green);"></i></div>
      <div style="font-size:16px;font-weight:500;color:var(--black);margin-bottom:4px;">Réservation confirmée !</div>
      <div style="font-size:13px;color:var(--gray-500);">Voulez-vous ajouter cette séance à votre agenda ?</div>
    </div>
    <div style="background:var(--black);padding:16px 22px;">
      <div style="font-size:15px;font-weight:500;color:#fff;margin-bottom:2px;" id="retour-film"></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:10px;" id="retour-cinema"></div>
      <div style="border-top:1px dashed rgba(255,255,255,0.2);margin-bottom:10px;"></div>
      <div style="display:flex;gap:20px;">
        <div><div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.4px;">Séance</div><div style="font-size:13px;font-weight:500;color:#fff;" id="retour-heure"></div></div>
        <div><div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.4px;">Date</div><div style="font-size:13px;font-weight:500;color:#fff;">Aujourd'hui</div></div>
      </div>
    </div>
    <div style="padding:14px 22px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary" id="btn-add-agenda" style="width:100%;justify-content:center;" onclick="addToAgenda()"><i class="ti ti-calendar-plus"></i> Ajouter à mon agenda</button>
      <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="closeRetourOverlay()">Fermer</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/tmdb.js"></script>
<script>
  let currentTab = 'now';
  let allFilms = [];
  let pendingReservation = null;

  async function loadFilms(tab) {
    const grid = document.getElementById('films-grid');
    // Skeletons
    grid.innerHTML = Array(8).fill(`
      <div class="skeleton-card">
        <div class="skeleton skeleton-poster"></div>
        <div class="skeleton-info">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-meta"></div>
        </div>
      </div>`).join('');

    try {
      const films = tab === 'now'
        ? await TMDB.getNowPlaying()
        : await TMDB.getUpcoming();

      allFilms = films;
      document.getElementById('films-count').textContent = films.length + ' films';

      grid.innerHTML = films.map((f, i) => {
        const poster = TMDB.posterUrl(f.poster_path);
        const genre = TMDB.getGenres(f.genre_ids);
        const note = f.vote_average ? (f.vote_average / 2).toFixed(1) : null;
        const badge = tab === 'now' ? 'À l\'affiche' : 'Bientôt';
        const badgeClass = tab === 'now' ? 'badge-new' : 'badge-soon';

        return `
          <div class="film-card" onclick="openFilmPopup(${f.id})" style="animation-delay:${i * 0.05}s">
            <div class="film-poster">
              ${poster
                ? `<img src="${poster}" alt="${f.title}" loading="lazy" />`
                : `<div class="film-poster-placeholder"><i class="ti ti-photo"></i></div>`
              }
              <span class="film-poster-badge badge ${badgeClass}">${badge}</span>
              ${note ? `<div class="film-note-overlay">★ ${note}</div>` : ''}
            </div>
            <div class="film-card-info">
              <div class="film-card-title">${f.title}</div>
              <div class="film-card-meta">
                <span>${genre}</span>
              </div>
            </div>
          </div>`;
      }).join('');

    } catch(e) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray-400);">
        <i class="ti ti-alert-circle" style="font-size:32px;display:block;margin-bottom:10px;"></i>
        Impossible de charger les films. Vérifiez votre connexion.
      </div>`;
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-now').classList.toggle('active', tab === 'now');
    document.getElementById('tab-soon').classList.toggle('active', tab === 'soon');
    loadFilms(tab);
  }

  // Popup film avec vraies données TMDB
  async function openFilmPopup(tmdbId) {
    const overlay = document.getElementById('film-overlay');
    const popup   = document.getElementById('film-popup');

    // Afficher un loading
    popup.innerHTML = `<div style="padding:60px;text-align:center;color:var(--gray-400);">
      <i class="ti ti-loader" style="font-size:28px;display:block;margin-bottom:10px;"></i>
      Chargement…
    </div>`;
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    try {
      const film = await TMDB.getMovie(tmdbId);
      const poster = TMDB.posterUrl(film.poster_path, 'w342');
      const director = film.credits?.crew?.find(c => c.job === 'Director');
      const actors = film.credits?.cast?.slice(0, 3).map(a => a.name).join(', ') || '—';
      const duree = TMDB.formatDuration(film.runtime);
      const note = film.vote_average ? (film.vote_average / 2).toFixed(1) : '—';
      const genres = film.genres?.map(g => g.name).join(', ') || '';

      // Séances factices (seront remplacées par vraies données cinémas)
      const seances = {
        "Aujourd'hui": ['14h00', '16h30', '19h15', '21h45'],
        'Demain':      ['13h30', '16h00', '18h45', '21h30']
      };

      popup.innerHTML = `
        <div class="popup-top">
          <div class="popup-poster" style="${poster ? '' : 'background:var(--gray-200);'}">
            ${poster
              ? `<img src="${poster}" alt="${film.title}" style="width:100%;height:100%;object-fit:cover;" />`
              : `<i class="ti ti-photo"></i>`
            }
          </div>
          <div class="popup-header">
            <span class="popup-badge">À l'affiche</span>
            <div class="popup-title">${film.title}</div>
            ${film.original_title && film.original_title !== film.title
              ? `<div style="font-size:12px;color:var(--gray-400);margin-bottom:6px;">${film.original_title}</div>` : ''}
            <div class="popup-tags">
              ${genres.split(', ').slice(0,2).map(g => `<span class="popup-tag">${g}</span>`).join('')}
              ${duree ? `<span class="popup-tag">${duree}</span>` : ''}
              <span class="popup-tag">★ ${note}/5</span>
            </div>
            <div class="popup-crew">
              ${director ? `<div class="popup-crew-row"><strong>Réalisateur ·</strong> ${director.name}</div>` : ''}
              <div class="popup-crew-row"><strong>Avec ·</strong> ${actors}</div>
            </div>
          </div>
        </div>
        <div class="popup-synopsis-block">
          <div class="section-label">Synopsis</div>
          <div class="popup-synopsis">${film.overview || 'Synopsis non disponible.'}</div>
        </div>
        <div class="popup-cinemas">
          <div class="popup-cinemas-label">Séances — Cinémas proches</div>
          <div style="padding:10px 18px 14px;font-size:13px;color:var(--gray-500);">
            <i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:5px;"></i>
            Activez votre position sur la <a href="index.html" style="color:var(--black);font-weight:500;">page d'accueil</a> pour voir les cinémas proches et leurs séances.
          </div>
          <div style="padding:0 18px 14px;">
            <div class="section-label">Réserver sur AlloCiné</div>
            <a href="https://www.allocine.fr/recherche/?q=${encodeURIComponent(film.title)}" target="_blank"
               style="display:inline-flex;align-items:center;gap:6px;background:var(--black);color:#fff;padding:9px 16px;border-radius:var(--radius-md);font-size:13px;font-weight:500;text-decoration:none;margin-top:6px;">
              <i class="ti ti-external-link"></i> Voir les séances sur AlloCiné
            </a>
          </div>
        </div>
        <button class="popup-close-btn" onclick="closeFilmPopup()">Fermer</button>
      `;

    } catch(e) {
      popup.innerHTML = `<div style="padding:40px;text-align:center;color:var(--gray-400);">
        Impossible de charger ce film.
        <button class="popup-close-btn" onclick="closeFilmPopup()" style="display:block;margin:16px auto 0;">Fermer</button>
      </div>`;
    }
  }

  function closeFilmPopup() {
    document.getElementById('film-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeOnBg(e) {
    if (e.target === document.getElementById('film-overlay')) closeFilmPopup();
  }

  function closeResaOverlay() {
    document.getElementById('resa-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeRetourOverlay() {
    document.getElementById('retour-overlay').classList.remove('open');
    document.body.style.overflow = '';
    pendingReservation = null;
  }

  function confirmReservation() {
    if (!pendingReservation) return;
    const q = encodeURIComponent(pendingReservation.film);
    window.open('https://www.allocine.fr/recherche/?q=' + q, '_blank');
    closeResaOverlay();
    setTimeout(() => showRetourPopup(), 800);
  }

  function showRetourPopup() {
    if (!pendingReservation) return;
    document.getElementById('retour-film').textContent    = pendingReservation.film;
    document.getElementById('retour-cinema').textContent  = pendingReservation.cinema || '';
    document.getElementById('retour-heure').textContent   = pendingReservation.heure || '';
    document.getElementById('retour-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function addToAgenda() {
    const btn = document.getElementById('btn-add-agenda');
    btn.innerHTML = '<i class="ti ti-check"></i> Ajouté à votre agenda !';
    btn.style.cssText = 'background:var(--green-bg);color:var(--green);border:0.5px solid #c8e6c9;width:100%;justify-content:center;';
    btn.onclick = null;
    if (pendingReservation) {
      const billets = JSON.parse(localStorage.getItem('cinepro_billets') || '[]');
      billets.unshift({ ...pendingReservation, date: new Date().toLocaleDateString('fr-FR') });
      localStorage.setItem('cinepro_billets', JSON.stringify(billets));
    }
  }

  // Init
  loadFilms('now');
</script>
</body>
</html>
