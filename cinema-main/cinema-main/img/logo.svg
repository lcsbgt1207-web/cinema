  <circle class="ink" cx="40" cy="14" r="3.5"/>
  <circle class="ink" cx="40" cy="8"  r="2.5"/>
  <circle class="ink" cx="53" cy="17" r="3"/>
  <circle class="ink" cx="57" cy="11" r="2"/>
  <circle class="ink" cx="63" cy="22" r="2.5"/>
  <circle class="ink" cx="67" cy="17" r="1.5"/>
  <circle class="ink" cx="68" cy="30" r="3"/>
  <circle class="ink" cx="72" cy="24" r="2"/>
  <!-- Grains sur le seau -->
