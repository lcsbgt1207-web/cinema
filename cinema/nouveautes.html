<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveautés — CinéProche</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    .page-content { padding: 0 0 48px; }

    /* Grille films */
    .films-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 24px 0;
    }
    @media (max-width: 900px) { .films-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .films-grid { grid-template-columns: 1fr; } }

    .film-card {
      border: 0.5px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.18s;
      background: var(--white);
    }
    .film-card:hover {
      border-color: var(--gray-300);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .film-poster {
      width: 100%;
      aspect-ratio: 2/3;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .film-poster i { font-size: 36px; color: rgba(255,255,255,0.35); }
    .film-poster-badge {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    .film-card-info {
      padding: 13px 15px 15px;
      border-top: 0.5px solid var(--gray-200);
    }
    .film-card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .film-card-meta {
      font-size: 12px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Animations en cascade */
    .film-card {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .film-card:nth-child(1) { animation-delay: 0.04s; }
    .film-card:nth-child(2) { animation-delay: 0.09s; }
    .film-card:nth-child(3) { animation-delay: 0.14s; }
    .film-card:nth-child(4) { animation-delay: 0.19s; }
    .film-card:nth-child(5) { animation-delay: 0.24s; }
    .film-card:nth-child(6) { animation-delay: 0.29s; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon"><i class="ti ti-movie"></i></div>
        <span class="logo-text">Ciné<span>Proche</span></span>
      </a>
      <div class="header-right">
        <nav class="nav">
          <a href="nouveautes.html" class="active">Nouveautés</a>
          <a href="catalogue.html">Catalogue</a>
          <a href="agenda.html">Mon agenda</a>
          <a href="#contact">Contact</a>
        </nav>
        <button class="btn-user" title="Mon profil" onclick="window.location.href='agenda.html#profil'">
          <i class="ti ti-user"></i>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ── CONTENU ── -->
<main class="container page-content">
  <div class="page-header">
    <div class="page-title">Nouveautés</div>
    <div class="page-count" id="films-count"></div>
  </div>

  <div class="films-grid" id="films-grid"></div>
</main>

<!-- OVERLAYS -->
<div class="overlay" id="film-overlay">
  <div class="popup" id="film-popup"></div>
</div>

<div class="overlay" id="resa-overlay">
  <div class="popup" style="max-width:420px;">
    <div style="padding:20px 22px 16px;border-bottom:0.5px solid var(--gray-200);">
      <div style="font-size:16px;font-weight:500;color:var(--black);margin-bottom:4px;" id="resa-film"></div>
      <div style="font-size:13px;color:var(--gray-500);display:flex;align-items:center;gap:5px;">
        <i class="ti ti-building"></i><span id="resa-cinema"></span>
      </div>
    </div>
    <div style="padding:16px 22px;display:flex;flex-direction:column;gap:10px;border-bottom:0.5px solid var(--gray-200);">
      <div style="display:flex;align-items:center;gap:12px;font-size:13px;">
        <i class="ti ti-clock" style="color:var(--gray-400);"></i>
        <span style="color:var(--gray-500);min-width:70px;">Séance</span>
        <span style="font-weight:500;" id="resa-heure"></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;font-size:13px;">
        <i class="ti ti-calendar" style="color:var(--gray-400);"></i>
        <span style="color:var(--gray-500);min-width:70px;">Date</span>
        <span style="font-weight:500;" id="resa-date"></span>
      </div>
    </div>
    <div style="padding:14px 22px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="confirmReservation()">
        <i class="ti ti-external-link"></i> Réserver sur AlloCiné
      </button>
      <p style="font-size:11px;color:var(--gray-400);text-align:center;">Vous serez redirigé vers AlloCiné. À votre retour, ajoutez la séance à votre agenda.</p>
      <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="closeResaOverlay()">Annuler</button>
    </div>
  </div>
</div>

<div class="overlay" id="retour-overlay">
  <div class="popup" style="max-width:420px;">
    <div style="padding:24px 22px 16px;text-align:center;border-bottom:0.5px solid var(--gray-200);">
      <div style="width:48px;height:48px;background:var(--green-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <i class="ti ti-check" style="font-size:22px;color:var(--green);"></i>
      </div>
      <div style="font-size:16px;font-weight:500;color:var(--black);margin-bottom:4px;">Réservation confirmée !</div>
      <div style="font-size:13px;color:var(--gray-500);">Voulez-vous ajouter cette séance à votre agenda ?</div>
    </div>
    <div style="background:var(--black);padding:16px 22px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div style="font-size:15px;font-weight:500;color:#fff;" id="retour-film"></div>
          <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;" id="retour-cinema"></div>
        </div>
        <span style="font-size:10px;background:rgba(255,255,255,0.15);color:#fff;border-radius:20px;padding:3px 9px;">Billet souvenir</span>
      </div>
      <div style="border-top:1px dashed rgba(255,255,255,0.2);margin-bottom:12px;"></div>
      <div style="display:flex;gap:20px;">
        <div><div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.4px;">Séance</div><div style="font-size:13px;font-weight:500;color:#fff;" id="retour-heure"></div></div>
        <div><div style="font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.4px;">Date</div><div style="font-size:13px;font-weight:500;color:#fff;">Aujourd'hui</div></div>
      </div>
    </div>
    <div style="padding:14px 22px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary" id="btn-add-agenda" style="width:100%;justify-content:center;" onclick="addToAgenda()">
        <i class="ti ti-calendar-plus"></i> Ajouter à mon agenda
      </button>
      <button class="btn btn-secondary" style="width:100%;justify-content:center;" onclick="closeRetourOverlay()">Fermer</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
  // Affiche uniquement les 6 premiers films (nouveautés)
  const nouveautes = FILMS.filter(f => f.badge !== null).slice(0, 6);
  document.getElementById('films-count').textContent = nouveautes.length + ' films à l\'affiche cette semaine';

  const grid = document.getElementById('films-grid');
  grid.innerHTML = nouveautes.map(f => `
    <div class="film-card" onclick="openFilmPopup(${f.id})">
      <div class="film-poster" style="background:${POSTER_COLORS[f.color]};">
        <i class="ti ti-photo"></i>
        <span class="film-poster-badge badge ${f.badge === 'Nouveau' ? 'badge-new' : 'badge-soon'}">${f.badge}</span>
      </div>
      <div class="film-card-info">
        <div class="film-card-title">${f.titre}</div>
        <div class="film-card-meta">
          <span>${f.genre}</span>
          <span>·</span>
          <span>${f.duree}</span>
        </div>
      </div>
    </div>
  `).join('');
</script>
</body>
</html>
