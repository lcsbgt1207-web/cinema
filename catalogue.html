<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogue — CinéProche</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    .page-content { max-width: 1320px; padding: 0 32px 56px; }

    /* TABLE */
    .table-wrap { overflow-x: auto; border: 0.5px solid var(--gray-200); border-radius: var(--radius-lg); margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 1080px; table-layout: fixed; }
    thead tr { background: var(--gray-50); border-bottom: 0.5px solid var(--gray-200); }
    th {
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 12px 16px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color var(--transition);
    }
    th:hover, th.sorted { color: var(--black); }
    th i { font-size: 11px; vertical-align: middle; margin-left: 3px; }
    th.note-col { text-align: center; }

    tbody tr {
      border-bottom: 0.5px solid var(--gray-200);
      cursor: pointer;
      transition: background var(--transition);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--gray-50); }

    td { padding: 14px 16px; font-size: 14px; color: var(--black); vertical-align: middle; }
    .td-title { width: 360px; max-width: 360px; }
    .td-title .film-cell > div { min-width: 0; }
    .film-name { font-weight: 600; font-size: 15px; line-height: 1.25; white-space: normal; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .film-original { font-size: 12px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .td-real { color: var(--gray-500); white-space: nowrap; font-size: 13px; }
    .td-note { text-align: center; }
    .td-year { color: var(--gray-500); font-size: 12px; white-space: nowrap; }
    .sep-left { border-left: 0.5px solid var(--gray-200); }

    .genre-pill {
      font-size: 11px;
      color: var(--gray-500);
      border: 0.5px solid var(--gray-200);
      border-radius: var(--radius-full);
      padding: 2px 9px;
      white-space: nowrap;
    }

    .source-header { display: flex; align-items: center; justify-content: center; gap: 4px; }
    .source-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-lb   { background: #00c030; }
    .dot-imdb { background: #f5c518; }
    .dot-sc   { background: #ff5f5f; }

    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-300);
      font-size: 16px;
      padding: 2px 4px;
      transition: color var(--transition);
    }
    .fav-btn:hover, .fav-btn.active { color: var(--black); }

    .table-footer { display:none; }

    .film-cell { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .film-thumb { width: 64px; height: 92px; border-radius: 6px; background: var(--gray-100); overflow: hidden; flex: 0 0 auto; display:flex; align-items:center; justify-content:center; color:var(--gray-300); }
    .film-thumb img { width: 100%; height: 100%; object-fit: cover; display:block; }
    .catalogue-bottom { margin-top: 18px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .page-state { font-size: 13px; color: var(--gray-500); width: 100%; }
    .pagination-controls { display: flex; align-items: center; gap: 8px; }
    .page-btn { width: 38px; height: 38px; border: 0.5px solid var(--gray-200); border-radius: 8px; background: var(--white); color: var(--black); cursor:pointer; font-size: 13px; transition: all var(--transition); }
    .page-btn:hover { border-color: var(--black); }
    .page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; border-color: var(--gray-200); }
    .page-size-select { height: 38px; border: 0.5px solid var(--gray-200); border-radius: 8px; padding: 0 34px 0 12px; background: var(--white); color: var(--gray-600); font-size: 13px; }
    table th:nth-child(1), table td:nth-child(1) { width: 42px; }
    table th:nth-child(2), table td:nth-child(2) { width: 380px; }
    table th:nth-child(3), table td:nth-child(3) { width: 230px; }
    table th:nth-child(4), table td:nth-child(4) { width: 160px; }
    table th:nth-child(5), table td:nth-child(5),
    table th:nth-child(6), table td:nth-child(6),
    table th:nth-child(7), table td:nth-child(7) { width: 145px; }
    table th:nth-child(8), table td:nth-child(8) { width: 100px; }

  </style>
</head>

<main class="container page-content">

  <!-- Toolbar filtres -->

    </div>
    <select class="filter-select" id="genre-filter" onchange="filterTable()">
      <option value="">Tous les genres</option>

      <option>Aventure</option>
      <option>Thriller</option>
      <option>Science-fiction</option>
      <option>Crime</option>
      <option>Policier</option>
      <option>Fantastique</option>
      <option>Animation</option>
      <option>Guerre</option>
      <option>Western</option>
      <option>Romance</option>
      <option>Comédie</option>
      <option>Documentaire</option>
    </select>
    <select class="filter-select" id="decade-filter" onchange="filterTable()">
      <option value="">Toutes les époques</option>
      <option>Années 2020</option>
      <option>Années 2010</option>
      <option>Années 2000</option>
      <option>Années 1990</option>
      <option>Avant 1990</option>
    </select>
    <select class="filter-select" id="radius-filter">
      <option>Rayon : 5 km</option>
      <option selected>Rayon : 15 km</option>
      <option>Rayon : 30 km</option>

    </select>

  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:30px;"></th>
          <th onclick="sortTable('titre')">Titre <i class="ti ti-selector" id="icon-titre"></i></th>
          <th onclick="sortTable('real')">Réalisateur <i class="ti ti-selector" id="icon-real"></i></th>
          <th onclick="sortTable('genre')">Genre</th>
          <th class="note-col sep-left" onclick="sortTable('lb')">
            <div class="source-header"><span class="source-dot dot-lb"></span> Letterboxd <i class="ti ti-selector" id="icon-lb"></i></div>
          </th>
          <th class="note-col sorted" onclick="sortTable('imdb')">
            <div class="source-header"><span class="source-dot dot-imdb"></span> IMDb <i class="ti ti-chevron-down" id="icon-imdb"></i></div>
          </th>
          <th class="note-col" onclick="sortTable('sc')">
            <div class="source-header"><span class="source-dot dot-sc"></span> SensCritique <i class="ti ti-selector" id="icon-sc"></i></div>
          </th>
          <th onclick="sortTable('annee')">Année <i class="ti ti-selector" id="icon-annee"></i></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <div class="catalogue-bottom" id="catalogue-bottom"></div>
</main>

<script src="js/data.js"></script>
<script src="js/omdb.js"></script>
<script>
  // Catalogue = films avec annee définie + films nouveautés
  let catalogue = FILMS.filter(f => f.lb && f.sc);
  const STATIC_CATALOGUE = [...catalogue];
  const LETTERBOXD_API_URL = 'http://localhost:3000/api/films-letterboxd';
  const LETTERBOXD_MIN_VALID_RATING = 0.5;
  const favs = new Set(JSON.parse(localStorage.getItem('cinepro_favs') || '[]'));
  let sortKey = 'imdb', sortDir = -1;
  let currentPage = 1;
  let pageSize = 8;
  let lastFilteredData = [];
  const MAX_PAGES = 10;

  const LABELS = { lb:'Letterboxd', imdb:'IMDb', sc:'SensCritique', annee:'Année', titre:'Titre', real:'Réalisateur', genre:'Genre' };

  function decadeMatch(annee, f) {
    if (!f || !annee) return true;
    if (f === 'Années 2020') return annee >= 2020;
    if (f === 'Années 2010') return annee >= 2010 && annee < 2020;
    if (f === 'Années 2000') return annee >= 2000 && annee < 2010;
    if (f === 'Années 1990') return annee >= 1990 && annee < 2000;
    if (f === 'Avant 1990') return annee < 1990;
    return true;
  }

  function formatImdbNote(film) {
    if (film.isMock) return '—';
    if (film.omdbLoaded && film.imdb === null) return '—';
    return Number.isFinite(film.imdb) ? `${film.imdb.toFixed(1)} ★` : '…';
  }

  function getSortValue(film, key) {
    if (key === 'imdb' && (film.isMock || !Number.isFinite(film.imdb))) return null;
    if (key === 'lbRank') return film.lbRank ?? null;
    return film[key] ?? null;
  }

  function compareValues(a, b) {
    if (a === null && b === null) return 0;
    if (a === null) return -1;
    if (b === null) return 1;

    if (typeof a === 'string' || typeof b === 'string') {
      return String(a).localeCompare(String(b), 'fr', { sensitivity: 'base' });
    }

    return a > b ? 1 : a < b ? -1 : 0;
  }

  function renderTable(data) {
    lastFilteredData = data;
    const totalPages = Math.max(1, Math.min(MAX_PAGES, Math.ceil(data.length / pageSize)));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * pageSize;
    const pageData = data.slice(start, start + pageSize);

    document.getElementById('table-body').innerHTML = pageData.map(f => {
      const poster = f.poster
        ? `<img src="${f.poster}" alt="Affiche ${f.titre}" loading="lazy">`
        : `<i class="ti ti-photo"></i>`;

      return `
      <tr onclick="openCatalogueFilmPopup(${f.id})">
        <td><button class="fav-btn ${favs.has(f.id) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav(${f.id}, this)">
          <i class="ti ti-bookmark"></i></button></td>
        <td class="td-title">
          <div class="film-cell">
            <div class="film-thumb">${poster}</div>
            <div>
              <div class="film-name">${f.lbRank ? '#' + f.lbRank + ' · ' : ''}${f.titre}</div>
              ${f.original ? `<div class="film-original">${f.original}</div>` : ''}
            </div>
          </div>
        </td>
        <td class="td-real">${f.real}</td>
        <td><span class="genre-pill">${f.genre}</span></td>
        <td class="td-note sep-left"><span class="note note-lb">${Number.isFinite(f.lb) ? f.lb.toFixed(1) + ' ★' : '—'}</span></td>
        <td class="td-note"><span class="note note-imdb">${formatImdbNote(f)}</span></td>
        <td class="td-note"><span class="note note-sc">${Number.isFinite(f.sc) ? f.sc.toFixed(1) : '—'}</span></td>
        <td class="td-year">${f.annee || '—'}</td>
      </tr>`;
    }).join('');

    document.getElementById('count-label').textContent = data.length + ' film' + (data.length > 1 ? 's' : '');
    document.getElementById('film-count').textContent = data.length + ' films';
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const bottom = document.getElementById('catalogue-bottom');
    if (!bottom) return;

    const pages = Array.from({ length: totalPages }, (_, index) => index + 1);
    bottom.innerHTML = `
      <div class="page-state">Page ${currentPage} sur ${totalPages}</div>
      <div class="pagination-controls">
        <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i class="ti ti-chevron-left"></i></button>
        ${pages.map(page => `<button class="page-btn ${page === currentPage ? 'active' : ''}" onclick="changePage(${page})">${page}</button>`).join('')}
        <button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i class="ti ti-chevron-right"></i></button>
      </div>
      <select class="page-size-select" onchange="changePageSize(this.value)">
        <option value="8" ${pageSize === 8 ? 'selected' : ''}>8 par page</option>
        <option value="12" ${pageSize === 12 ? 'selected' : ''}>12 par page</option>
        <option value="25" ${pageSize === 25 ? 'selected' : ''}>25 par page</option>
      </select>
    `;
  }

  function changePage(page) {
    currentPage = page;
    renderTable(lastFilteredData);
  }

  function changePageSize(value) {
    pageSize = Number(value) || 8;
    currentPage = 1;
    filterTable();
  }

  function updateIcons() {
    ['titre','real','lb','imdb','sc','annee'].forEach(k => {
      const el = document.getElementById('icon-' + k);
      if (!el) return;
      el.className = k === sortKey ? (sortDir === -1 ? 'ti ti-chevron-down' : 'ti ti-chevron-up') : 'ti ti-selector';
    });
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const g = document.getElementById('genre-filter').value;
    const d = document.getElementById('decade-filter').value;
    let data = catalogue.filter(f =>
      (!q || String(f.titre || '').toLowerCase().includes(q) || String(f.real || '').toLowerCase().includes(q) || String(f.original || '').toLowerCase().includes(q)) &&
      (!g || f.genre === g) &&
      decadeMatch(f.annee, d)
    );
    data.sort((a, b) => {
      const va = getSortValue(a, sortKey);
      const vb = getSortValue(b, sortKey);
      return compareValues(va, vb) * sortDir;
    });
    renderTable(data);
    updateIcons();
  }

  function sortTable(key) {
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = -1; }
    currentPage = 1;
    filterTable();
  }

  function toggleFav(id, btn) {
    if (favs.has(id)) { favs.delete(id); btn.classList.remove('active'); }
    else { favs.add(id); btn.classList.add('active'); }
    localStorage.setItem('cinepro_favs', JSON.stringify([...favs]));
  }



  function slugToTitle(slug) {
    return String(slug || '')
      .split('-')
      .filter(Boolean)
      .map(word => word.charAt(0).toUpperCase() + word.slice(1))
      .join(' ');
  }

  function makeLetterboxdFilm(film, index) {
    const title = film.title || film.titre || slugToTitle(film.letterboxdSlug) || 'Film Letterboxd';
    return {
      id: 900000 + (Number(film.rank) || index + 1),
      titre: title,
      original: '',
      genre: 'Letterboxd',
      duree: '—',
      real: 'Non renseigné',
      acteurs: 'Non renseigné',
      synopsis: `Film importé depuis l’API Letterboxd locale. Rang Letterboxd : #${film.rank || index + 1}.`,
      color: ['p1','p2','p3','p4','p5','p6'][index % 6],
      badge: 'Letterboxd',
      lbRank: Number(film.rank) || index + 1,
      lb: Number.isFinite(Number(film.letterboxdRating)) ? Number(film.letterboxdRating) : null,
      imdb: null,
      sc: null,
      annee: null,
      cinemas: [],
      letterboxdUrl: film.letterboxdUrl || (film.letterboxdSlug ? `https://letterboxd.com/film/${film.letterboxdSlug}/` : null),
      sourceType: film.sourceType || 'api-letterboxd',
      isApiFilm: true,
      isMock: false
    };
  }

  function normalizeFilmKey(value) {
    return String(value || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/^(the|le|la|les|l')\s+/i, '')
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
  }

  function applyLetterboxdRatings(apiFilms) {
    if (!Array.isArray(apiFilms) || !apiFilms.length) return 0;

    let updated = 0;
    for (const film of catalogue) {
      const keys = [film.titre, film.original].map(normalizeFilmKey).filter(Boolean);
      const match = apiFilms.find(apiFilm => {
        const apiKeys = [apiFilm.title, apiFilm.titre, apiFilm.original, apiFilm.letterboxdSlug]
          .map(normalizeFilmKey)
          .filter(Boolean);
        return keys.some(key => apiKeys.includes(key));
      });

      const rating = Number(match?.letterboxdRating ?? match?.lb ?? match?.rating);
      // Sécurité importante : Letterboxd ne doit JAMAIS remplacer une vraie note
      // par null, 0 ou une donnée invalide. Si le scrape rate, on garde data.js.
      if (Number.isFinite(rating) && rating >= LETTERBOXD_MIN_VALID_RATING) {
        film.lb = Math.round(rating * 10) / 10;
        updated++;
      }
    }
    return updated;
  }

  async function loadLetterboxdCatalogue() {
    const countLabel = document.getElementById('film-count');
    if (countLabel) countLabel.textContent = 'Chargement Letterboxd…';

    // Important : Letterboxd ne sert maintenant qu'à mettre à jour les notes.
    // On garde toujours le catalogue local pour les affiches, synopsis, réalisateurs et genres.
    catalogue = STATIC_CATALOGUE;

    try {
      const response = await fetch(LETTERBOXD_API_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error('API indisponible');

      const payload = await response.json();
      const apiFilms = Array.isArray(payload.films) ? payload.films : [];
      const updated = applyLetterboxdRatings(apiFilms);
      console.log(`Notes Letterboxd mises à jour : ${updated}. Données TMDB/locales conservées.`);
      return true;
    } catch (error) {
      console.warn('API Letterboxd non disponible, catalogue statique utilisé :', error.message);
      return false;
    }
  }

  function openCatalogueFilmPopup(id) {
    const film = FILMS.find(f => f.id === id) || catalogue.find(f => f.id === id);
    if (!film) return;

    if (typeof buildPopupHTML === 'function') {
      const popup = document.getElementById('film-popup');
      const overlay = document.getElementById('film-overlay');
      if (!popup || !overlay) return;
      popup.innerHTML = buildPopupHTML(film);
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      return;
    }

    openFilmPopup(id);
  }


  async function initCatalogue() {
    await loadLetterboxdCatalogue();
    filterTable();

    await enrichFilmsWithOmdb(catalogue.filter(f => !f.isApiFilm), (current, total) => {
      filterTable();
    });

    filterTable();
  }

  initCatalogue();
</script>
</body>
